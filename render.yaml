services:
  - type: web
    name: giyim
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --no-audit --no-fund && npm run render:build
    startCommand: npm run render:start
    disks:
      - name: uploads
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PANEL_KEY
        sync: false
